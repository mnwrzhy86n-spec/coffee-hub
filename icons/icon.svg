<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full-bleed background: iOS rounds the corners itself -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#242019"/>
      <stop offset="1" stop-color="#131110"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#g)"/>
  <g fill="none" stroke="#d99a5b" stroke-linecap="round" stroke-linejoin="round">
    <!-- Steam -->
    <g stroke-width="15" opacity="0.85">
      <path d="M217 100 c-14 24 14 36 0 60"/>
      <path d="M283 88 c-14 24 14 36 0 60"/>
    </g>
    <!-- Cup -->
    <path stroke-width="20" d="M128 208 h215 v66 a107 96 0 0 1 -215 0 z"/>
    <!-- Handle -->
    <path stroke-width="20" d="M348 232 h16 a44 44 0 0 1 0 88 h-24"/>
    <!-- Saucer -->
    <path stroke-width="20" d="M150 428 h180"/>
  </g>
</svg>
