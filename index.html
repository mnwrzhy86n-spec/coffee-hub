<!doctype html>
<html lang="en">
<head>

<body data-page="home">

  <main class="hub">
    <h1 class="hub-hello">Coffee Hub</h1>
    <p class="hub-sub">Everything you need for a great cup.</p>

    <a class="hero" href="espresso.html">
      <span class="hero-icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h13v4.5a6.5 6.5 0 0 1-13 0V9z"/><path d="M17 10h1.5a2.5 2.5 0 0 1 0 5H17"/><path d="M6.5 21h8"/><path d="M8.5 2.5c-.7 1 .7 1.6 0 2.6M12.5 2.5c-.7 1 .7 1.6 0 2.6"/></svg>

      <span class="hero-title">Make an Espresso</span>
      <span class="hero-sub">From bean to cup, with a shot timer.</span>
      <span class="hero-go">Start</span>
    </a>

    <div class="hub-grid">
      <a class="hub-card" href="drinks.html">
        <span class="card-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 7.5 8.5 20h7l2-12.5"/><path d="M4.5 7.5h15"/><path d="M6.5 7.5 5.2 4.5"/></svg>
        </span>
        <span class="card-title">Milk Drinks</span>
        <span class="card-sub">Latte, flat white, cortado…</span>
      </a>
      <a class="hub-card" href="troubleshooting.html">
        <span class="card-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 8h4.5M12.5 8H20"/><circle cx="10.5" cy="8" r="2"/><path d="M4 16h7.5M15.5 16H20"/><circle cx="13.5" cy="16" r="2"/></svg>
        </span>
        <span class="card-title">Troubleshooting</span>
        <span class="card-sub">Sour? Bitter? Too fast?</span>
      </a>
      <a class="hub-card" href="cleaning.html">
        <span class="card-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M11 4l1.8 4.7 4.7 1.8-4.7 1.8L11 17l-1.8-4.7L4.5 10.5l4.7-1.8z"/><path d="M18.5 15.5l.9 2.1 2.1.9-2.1.9-.9 2.1-.9-2.1-2.1-.9 2.1-.9z"/></svg>

        <span class="card-title">Cleaning</span>
        <span class="card-sub">Daily &amp; weekly care</span>
      </a>
      <a class="hub-card" href="espresso.html">
        <span class="card-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </span>
        <span class="card-title">The Guide</span>
        <span class="card-sub">The full espresso flow</span>
      </a>
