<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full-bleed background: iOS rounds the corners itself -->
  <rect width="512" height="512" fill="#6f4e37"/>
  <rect width="512" height="512" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a6448"/>
      <stop offset="1" stop-color="#5a3c28"/>
    </linearGradient>
  </defs>
  <!-- Steam -->
  <g stroke="#f5efe7" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M215 118 c-12 22 12 34 0 56"/>
    <path d="M275 104 c-12 22 12 34 0 56"/>
  </g>
  <!-- Saucer -->
  <ellipse cx="245" cy="400" rx="150" ry="26" fill="#f5efe7" opacity="0.9"/>
  <!-- Cup -->
  <path d="M140 218 h210 v70 a105 92 0 0 1 -210 0 z" fill="#f5efe7"/>
  <!-- Handle -->
  <path d="M350 236 h18 a44 44 0 0 1 0 88 h-24" fill="none" stroke="#f5efe7" stroke-width="20"/>
  <!-- Crema -->
  <ellipse cx="245" cy="224" rx="93" ry="18" fill="#c89b74"/>
</svg>
